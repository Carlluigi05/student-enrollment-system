<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="../Pics/logoOrg.png" type="image/png">
    <title>User Type Selection</title>
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-success">

    <div class="card shadow p-4 rounded-3" style="min-width: 350px;">
        <h3 class="text-center mb-3 fw-bold">Select User Type</h3>
        <form id="userTypeForm">
            <div class="form-group mb-3">
                <label for="userType" class="form-label">Login as:</label>
                <select class="form-select" id="userType" required>
                    <option value="" disabled selected>Select Type</option>
                    <option value="superAdmin">👤 Super Admin</option>
                    <option value="admin">🛠️ Admin</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Proceed</button>
        </form>
    </div>


  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
  <script defer src="userSelection.js"></script>
</body>
</html>
