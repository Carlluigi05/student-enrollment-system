<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="icon" href="../Pics/logoOrg.png" type="image/png">
    <title>Form Type Selection</title>

    <style>
        body{
            background-color: #cfe7ff;
        }
    </style>

</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-opacity-75">

    <div class="card shadow p-4 rounded-3" style="min-width: 400px;">
        <i class="bi bi-check2-circle  text-center" style="font-size: 3rem; color: #3899f9;"></i>
        <h3 class="text-center mb-3 fw-bold">Select Form Type</h3>
        <form id="formTypeForm">
            <div class="form-group mb-3">
                <label for="formType" class="form-label">Choose Form:</label>
                <select class="form-select" id="formType" required>
                    <option value="" disabled selected>Select Form</option>
                    <option value="basicEducation">📘 Basic Education Enrollment Form</option>
                    <option value="confirmationSlip">📄 Confirmation Slip</option>
                </select>
                <small id="formCaption" class="form-text text-muted mt-2 d-block"></small>
            </div>
            <button type="submit" class="btn btn-primary w-100">Proceed</button>
        </form>
    </div>

    <script>
        const formType = document.getElementById('formType');
        const caption = document.getElementById('formCaption');

        formType.addEventListener('change', function() {
            if (this.value === 'basicEducation') {
                caption.textContent = "This form is required for incoming KINDERGARTEN and GRADE 1 enrollees and TRANSFEREES.";
            } else if (this.value === 'confirmationSlip') {
                caption.textContent = "This form is required for the grade 2 - 6 enrollees to confirm their enrollment.";
            } else {
                caption.textContent = "";
            }
        });

        document.getElementById('formTypeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const type = document.getElementById('formType').value;

            if (type === "basicEducation"){
                window.location.href = "beefForm.php";
            }
            else if (type === "confirmationSlip"){
                window.location.href = "confirmationSlipForm.php";
            }
            else {
                alert("Please Select a valid type of Form")
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
